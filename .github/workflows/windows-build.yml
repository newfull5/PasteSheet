name: Windows Build

# Builds the Windows app as a single, self-contained .exe (no installer / no
# .NET prerequisite) and attaches it to the published release so the download
# button on the site resolves to it. Manual runs upload an artifact instead.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file exe
        run: >
          dotnet publish apps/windows/PasteSheet
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -o publish

      - name: Name the asset
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if (-not $tag) { $tag = "dev" }
          Copy-Item publish/PasteSheet.exe "publish/PasteSheet-$tag-win-x64.exe"

      - name: Attach to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          "publish/PasteSheet-${{ github.event.release.tag_name }}-win-x64.exe"
          --clobber

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PasteSheet-win-x64
          path: publish/PasteSheet-dev-win-x64.exe
