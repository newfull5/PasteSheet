name: PasteSheets
options:
  bundleIdPrefix: com.newfull5
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  PasteSheets:
    type: application
    platform: macOS
    sources:
      - path: PasteSheets
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.newfull5.pastesheet
        INFOPLIST_FILE: PasteSheets/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PasteSheets/Resources/PasteSheets.entitlements
        PRODUCT_NAME: PasteSheet
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    entitlements:
      path: PasteSheets/Resources/PasteSheets.entitlements
